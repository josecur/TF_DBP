<div class="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm 
            flex items-center justify-center p-4">

  <div class="bg-white border border-slate-200 rounded-3xl max-w-sm w-full p-6 
              shadow-xl relative space-y-5 animate-in fade-in zoom-in-95 
              duration-200 text-left">

    <!-- Botón cerrar -->
    <button (click)="cerrarModal()" type="button"
            class="absolute top-4 right-4 w-7 h-7 bg-slate-50 border border-slate-200 
                   text-slate-400 font-black rounded-lg flex items-center justify-center 
                   text-xs hover:bg-slate-100 hover:text-slate-600 transition-all 
                   select-none cursor-pointer">
      ✕
    </button>

    <!-- Header -->
    <div class="text-center space-y-1 pt-2">
      <span class="text-[9px] font-bold text-blue-700 uppercase tracking-widest block">
        Portal de Acceso
      </span>
      <h3 class="text-xl font-black text-slate-900 uppercase italic leading-none">
        Iniciar Sesión
      </h3>
    </div>

    <!-- Toggle rol -->
    <div class="grid grid-cols-2 p-1 bg-slate-100 border border-slate-200/60 
                rounded-xl text-center">
      <button type="button" (click)="cambiarRol('usuario')"
              [class]="rolSeleccionado() === 'usuario'
                ? 'bg-white text-blue-700 font-bold shadow-sm'
                : 'text-slate-500 font-medium hover:text-slate-700'"
              class="py-1.5 rounded-lg text-[10px] uppercase tracking-wider 
                     transition-all select-none cursor-pointer">
        👨 Usuario
      </button>
      <button type="button" (click)="cambiarRol('especialista')"
              [class]="rolSeleccionado() === 'especialista'
                ? 'bg-white text-blue-700 font-bold shadow-sm'
                : 'text-slate-500 font-medium hover:text-slate-700'"
              class="py-1.5 rounded-lg text-[10px] uppercase tracking-wider 
                     transition-all select-none cursor-pointer">
        🩺 Especialista
      </button>
    </div>

    <!-- Error -->
    @if (errorMensaje()) {
      <div class="p-3 bg-red-50 text-red-600 border border-red-200 rounded-xl 
                  text-[10px] font-bold tracking-wide leading-tight flex gap-2">
        <span>⚠</span>
        <span>{{ errorMensaje() }}</span>
      </div>
    }

    <!-- Form -->
    <form (ngSubmit)="procesarLogin()" class="space-y-4">

      <!-- Identificador -->
      <div class="space-y-1">
        <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500 block">
          {{ rolSeleccionado() === 'usuario' 
             ? 'Correo Electrónico *' 
             : 'Correo del Especialista *' }}
        </label>
        <input type="text"
               [(ngModel)]="credenciales.identificador"
               name="identificador"
               required
               [placeholder]="rolSeleccionado() === 'usuario' 
                 ? 'tu-correo@usil.pe' 
                 : 'especialista@usil.pe'"
               class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 
                      rounded-xl text-xs font-medium text-slate-800 
                      focus:outline-none focus:border-blue-700 focus:bg-white 
                      transition-all placeholder-slate-400">
      </div>

      <!-- Password -->
      <div class="space-y-1">
        <div class="flex justify-between items-center">
          <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500 block">
            Contraseña *
          </label>
          <span class="text-[9px] font-bold text-slate-400 hover:text-blue-700 
                       transition-colors cursor-pointer select-none">
            ¿La olvidaste?
          </span>
        </div>
        <input type="password"
               [(ngModel)]="credenciales.password"
               name="password"
               required
               placeholder="••••••••"
               class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 
                      rounded-xl text-xs font-medium text-slate-800 
                      focus:outline-none focus:border-blue-700 focus:bg-white 
                      transition-all">
      </div>

      <!-- Submit con spinner ✅ -->
      <button type="submit"
              [disabled]="cargando() || !credenciales.identificador.trim() || credenciales.password.trim().length < 4"
              class="w-full py-3 bg-blue-700 hover:bg-blue-800 text-white font-bold 
                     rounded-xl text-xs uppercase tracking-wider transition-all 
                     shadow-sm disabled:opacity-40 disabled:cursor-not-allowed 
                     cursor-pointer flex items-center justify-center gap-2">

        @if (cargando()) {
          <svg class="animate-spin h-4 w-4 text-white" viewBox="0 0 24 24" fill="none">
            <circle class="opacity-25" cx="12" cy="12" r="10"
                    stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor"
                  d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>
          Verificando...
        } @else {
          Acceder al Panel →
        }

      </button>

      <!-- Footer links -->
      <div class="text-center pt-2 border-t border-slate-100">
        @if (rolSeleccionado() === 'especialista') {
          <p class="text-[10px] text-slate-400 font-medium">
            ¿Eres un nuevo profesional de salud?
            <a routerLink="/registro-especialista"
               (click)="cerrarModal()"
               class="text-blue-700 font-bold hover:underline block mt-0.5 cursor-pointer">
              Únete a la Red MindStep →
            </a>
          </p>
        } @else {
          <p class="text-[10px] text-slate-400 font-medium">
            ¿No tienes perfil de estudiante?
            <a (click)="cerrarModal()"
               onclick="document.getElementById('test-section').scrollIntoView({behavior:'smooth'})"
               class="text-blue-700 font-bold hover:underline block mt-0.5 cursor-pointer">
              Resuelve la Evaluación Inicial →
            </a>
          </p>
        }
      </div>

    </form>
  </div>
</div>
