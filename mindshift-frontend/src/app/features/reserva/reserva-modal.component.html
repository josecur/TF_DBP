<div class="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 antialiased">
  
  <div class="bg-white border border-slate-200 rounded-[32px] max-w-sm w-full p-6 md:p-8 shadow-2xl relative space-y-5 animate-in fade-in zoom-in-95 duration-200 text-left">
    
    <button (click)="cerrar.emit()" type="button" 
            class="absolute top-5 right-5 w-8 h-8 bg-slate-50 border border-slate-200 text-slate-400 font-black rounded-xl flex items-center justify-center text-xs hover:bg-red-50 hover:text-red-600 transition-all cursor-pointer">
      ✕
    </button>

    <div class="space-y-1 pt-2">
      <div class="inline-flex items-center gap-2 px-2.5 py-1 bg-blue-50 border border-blue-100 rounded-lg">
        <span class="w-2 h-2 rounded-full bg-blue-600 animate-pulse"></span>
        <span class="text-[9px] font-black text-blue-700 uppercase tracking-widest">Solicitud de Enlace</span>
      </div>
      <h3 class="text-lg font-black text-slate-900 uppercase italic leading-none">Vincular Especialista</h3>
      <p class="text-[11px] text-slate-400 font-medium leading-tight">
        Se enviará una solicitud privada a <strong>Dr(a). {{ medico?.nombreProfesional }} {{ medico?.apellidoProfesional }}</strong>. Los datos de contacto mutuos se liberarán una vez aceptada la reserva.
      </p>
    </div>

    @if (error()) {
      <div class="p-3 bg-red-50 border border-red-200 rounded-2xl text-[10px] text-red-600 font-bold flex items-center gap-2">
        <span>⚠️</span> {{ error() }}
      </div>
    }

    <div class="space-y-1.5">
      <label class="text-[10px] font-black uppercase tracking-wider text-slate-500 ml-1">Escribe un mensaje de presentación *</label>
      <textarea [ngModel]="mensajeEstudiante()" 
                (ngModelChange)="mensajeEstudiante.set($event)"
                rows="4" 
                maxLength="200"
                placeholder="Hola, me gustaría agendar una orientación contigo debido a mi carga académica..."
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-xs font-medium text-slate-800 focus:outline-none focus:border-blue-600 focus:bg-white transition-all resize-none"></textarea>
    </div>

    <div class="pt-1">
      <button (click)="confirmarReserva()" 
              [disabled]="cargando() || !mensajeEstudiante().trim()"
              class="w-full py-4 bg-blue-700 hover:bg-blue-800 text-white font-black rounded-2xl text-[11px] uppercase tracking-[0.15em] transition-all shadow-lg disabled:opacity-40 flex items-center justify-center gap-3 cursor-pointer">
        
        @if (cargando()) {
          Enviando puente...
        } @else {
          Enviar Solicitante Privada →
        }
      </button>
    </div>

  </div>
</div>
