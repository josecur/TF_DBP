<div class="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl space-y-4 text-left">
    <h2 class="text-sm font-black text-slate-900 uppercase tracking-widest border-b pb-3">Detalle de Consulta</h2>
    
    @if (citaData) {
      <p class="text-xs text-slate-600 leading-relaxed">
        El especialista <strong>{{ citaData.medico_nombre }}</strong> ha habilitado sus datos de contacto para iniciar tu proceso de acompañamiento:
      </p>
      
      <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 space-y-3">
        <a [href]="'mailto:' + citaData.medico_contacto.correo" 
           class="block w-full p-3 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-700 hover:border-blue-500 transition-all text-center shadow-xs">
          📧 {{ citaData.medico_contacto.correo }}
        </a>
        <a [href]="citaData.medico_contacto.enlace" target="_blank" 
           class="block w-full p-3 bg-green-600 text-white rounded-xl text-xs font-bold text-center hover:bg-green-700 transition-all shadow-md">
          📱 Abrir WhatsApp
        </a>
      </div>
    }

    <button (click)="cerrarModal()" 
            class="w-full py-3 bg-slate-100 hover:bg-slate-200 rounded-xl font-bold text-xs uppercase tracking-wider text-slate-600 transition-all">
      Cerrar
    </button>
  </div>
</div>
