spring.application.name=mindshift-backend-kotlin

# Mismo puerto que usaba Django, para que el frontend Angular no cambie ninguna URL
server.port=8000

# --- Base de datos H2 en ARCHIVO (cero instalacion, los datos persisten entre reinicios) ---
# El archivo se crea en ./data/mindshift.mv.db dentro del proyecto
spring.datasource.url=jdbc:h2:file:./data/mindshift;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
# 'update' crea/actualiza las tablas automaticamente al arrancar (equivale a migrate de Django)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# --- Consola web de H2: http://localhost:8000/h2-console (JDBC URL: jdbc:h2:file:./data/mindshift) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
